name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.6.6"

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Set environment variables for tests
      run: |
        echo "DISCORD_BOT_TOKEN=test_token_for_ci" >> $GITHUB_ENV
        echo "EMAIL_USERNAME=test@example.com" >> $GITHUB_ENV
        echo "EMAIL_PASSWORD=test_password" >> $GITHUB_ENV
        echo "CHANNEL_ID=123456789" >> $GITHUB_ENV
        echo "IMAP_SERVER=imap.test.com" >> $GITHUB_ENV
        echo "SMTP_SERVER=smtp.test.com" >> $GITHUB_ENV
        echo "ESPO_API_KEY=${{ secrets.ESPO_API_KEY }}" >> $GITHUB_ENV
        echo "ESPO_BASE_URL=${{ secrets.ESPO_BASE_URL }}" >> $GITHUB_ENV
        echo "KIMAI_BASE_URL=${{ secrets.KIMAI_BASE_URL }}" >> $GITHUB_ENV
        echo "KIMAI_API_TOKEN=${{ secrets.KIMAI_API_TOKEN }}" >> $GITHUB_ENV

    - name: Run tests with pytest
      run: |
        uv run pytest tests/ -v --tb=short

    - name: Run tests with coverage
      run: |
        uv run coverage run -m pytest tests/
        uv run coverage report
        uv run coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.6.6"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras
        uv add --dev ruff mypy

    - name: Run ruff linter
      run: |
        uv run ruff check apps/discord_bot/src/five08/ apps/worker/src/five08/ packages/shared/src/five08/ tests/

    - name: Run ruff formatter
      run: |
        uv run ruff format --check apps/discord_bot/src/five08/ apps/worker/src/five08/ packages/shared/src/five08/ tests/

    - name: Run mypy type checker
      run: |
        uv run mypy apps/discord_bot/src/five08/ apps/worker/src/five08/ packages/shared/src/five08/ --ignore-missing-imports --explicit-package-bases

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.6.6"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras
        uv add --dev bandit safety

    - name: Run bandit security linter
      run: |
        uv run bandit -r apps/discord_bot/src/five08/ -r apps/worker/src/five08/ -r packages/shared/src/five08/ -f json -o bandit-report.json || true

    - name: Run safety check
      run: |
        uv run safety check --json --output safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Status check for PRs - ensures all tests pass before merge
  all-tests-passed:
    if: always()
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    steps:
    - name: Check all jobs
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "Tests failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "Linting failed"
          exit 1
        fi
        if [[ "${{ needs.security.result }}" != "success" ]]; then
          echo "Security checks failed"
          exit 1
        fi
        echo "All checks passed!"
