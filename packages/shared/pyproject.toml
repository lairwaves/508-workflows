[project]
name = "five08"
version = "0.1.0"
description = "Shared settings, queue, and job utilities for 508.dev services"
requires-python = ">=3.12"
dependencies = [
    "cloakbrowser>=0.3.18",
    "curl-cffi>=0.10.0",
    "pydantic~=2.10",
    "pydantic-settings~=2.8",
    "pymupdf>=1.26.5",
    "python-docx>=1.2.0",
    "psycopg[binary]>=3.2.5",
    "redis>=6.4.0",
    "requests~=2.31",
    "sentry-sdk>=2.30.0",
]

[project.scripts]
crmctl = "five08.crm_cli:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/five08"]
